name: Publish package to npm

on:
  push:
    branches:
      - main
      - nu11/actions
    paths:
      - "src/**"
      - ".github/workflows/publish.yml"
      - "scripts/publish.ts"
      - "package.json"

  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # Required for npm OIDC provenance

jobs:
  publish:
    name: 📰 Publish to Github Registry
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Ensure latest npm
        run: bun install -g npm@latest

      - name: 💾 Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Setup git
        run: |
          git config --global user.name 'Toodle CI'
          git config --global user.email 'ci@toodle.gg'

      - name: Publish
        run: bun ./scripts/publish.ts
